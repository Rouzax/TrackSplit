[project]
name = "tracksplit"
version = "0.1.0"
description = "Extract audio from video chapters into FLAC music albums"
requires-python = ">=3.11"
dependencies = [
    "Pillow>=10.0",
    "typer>=0.9",
    "mutagen>=1.47",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.10",
]

[tool.setuptools.packages.find]
where = ["src"]

[project.scripts]
tracksplit = "tracksplit.cli:run"
