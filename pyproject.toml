[project]
name = "tracksplit"
version = "0.6.5"
description = "Extract audio from video chapters into FLAC music albums"
readme = "README.md"
license = { text = "GPL-3.0-only" }
requires-python = ">=3.11"
dependencies = [
    "Pillow>=10.0",
    "typer>=0.9",
    "mutagen>=1.47",
    "rich>=13.0",
    "numpy>=1.24",
    "ftfy>=6.0",
]

[project.urls]
Homepage = "https://rouzax.github.io/TrackSplit/"
Documentation = "https://rouzax.github.io/TrackSplit/docs/"
Repository = "https://github.com/Rouzax/TrackSplit"
Issues = "https://github.com/Rouzax/TrackSplit/issues"

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-mock>=3.10",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
tracksplit = ["fonts/*.ttf"]

[project.scripts]
tracksplit = "tracksplit.cli:run"

[tool.pytest.ini_options]
markers = [
    "integration: opt-in tests that run the real pipeline against local MKVs",
]
