# Local git hooks. Run `pre-commit install` once to enable them, then they run
# on every commit. This mirrors the CI lint job in .github/workflows/tests.yml;
# hook versions are pinned to match the dev dependencies in pyproject.toml.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # mypy and basedpyright both run from the project environment (pyproject dev
  # deps) rather than an isolated env: they need the runtime deps (rich,
  # Pillow, mutagen, ...) importable. For mypy, dep-dependent `# type: ignore`
  # comments are otherwise wrongly flagged as unused; for pyright, missing deps
  # would surface as import errors. Requires `pip install .[dev]` first.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        # Honour [tool.mypy] (files = ["src"]) instead of the changed-file list.
        pass_filenames: false
      - id: basedpyright
        name: basedpyright
        entry: basedpyright
        language: system
        types: [python]
        # Honour [tool.pyright] (include = ["src"]) instead of changed files.
        pass_filenames: false

  - repo: https://github.com/mgedmin/check-manifest
    rev: "0.51"
    hooks:
      - id: check-manifest
        # Building the sdist is slow, so only run this before pushing.
        stages: [pre-push]
