# Hand-synced with .github/workflows/release.yml in the CrateDigger repo.
# Keep in sync when editing.
#
# Triggered manually from the GitHub UI, the gh CLI, or the REST API:
#   gh workflow run release.yml -f version=X.Y.Z
# The workflow validates pyproject.toml and CHANGELOG.md against the input
# version, builds artifacts, tags, and publishes a GitHub Release.

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z, no v prefix)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version input
        id: validate
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match X.Y.Z (got: $VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not already exist
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          if git rev-parse "$TAG" &>/dev/null; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Verify pyproject.toml version matches
        env:
          WANT: ${{ steps.validate.outputs.version }}
        run: |
          got=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$WANT" != "$got" ]]; then
            echo "::error::pyproject.toml version ($got) does not match input version ($WANT)"
            exit 1
          fi

      - name: Verify CHANGELOG has [X.Y.Z] section
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          if ! grep -qE "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md does not contain a ## [$VERSION] section"
            exit 1
          fi
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "::error::[$VERSION] section is empty"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            dist/*.whl dist/*.tar.gz
