# Hand-synced with .github/workflows/release.yml in the CrateDigger repo.
# Keep in sync when editing.
#
# Triggered manually from the GitHub UI, the gh CLI, or the REST API:
#   gh workflow run release.yml -f version=X.Y.Z
# The workflow validates pyproject.toml and CHANGELOG.md against the input
# version, builds artifacts, tags, and publishes a GitHub Release.

name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (X.Y.Z, no v prefix)'
        required: true
        type: string

jobs:
  # Gate: run the full lint + test matrix on the release ref before building.
  # Reuses tests.yml so the release checks and the push/PR checks stay identical.
  verify:
    uses: ./.github/workflows/tests.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Validate version input
        id: validate
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match X.Y.Z (got: $VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not already exist
        env:
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          if git rev-parse "$TAG" &>/dev/null; then
            echo "::error::Tag $TAG already exists"
            exit 1
          fi

      - name: Verify version is consistent everywhere
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: scripts/check-versions.sh "$VERSION"

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ steps.validate.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            $0 ~ "^## \\["ver"\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "::error::[$VERSION] section is empty"
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.validate.outputs.tag }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            dist/*.whl dist/*.tar.gz
