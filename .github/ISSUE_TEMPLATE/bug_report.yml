name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: The full command you ran
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: TrackSplit version, Python version, OS, ffmpeg version
      placeholder: |
        TrackSplit version:
        Python version:
        OS:
        ffmpeg version:
    validations:
      required: false

  - type: textarea
    id: check-output
    attributes:
      label: tracksplit --check output
      description: Output of running `tracksplit --check`
      render: text
    validations:
      required: false

  - type: textarea
    id: debug-output
    attributes:
      label: Debug output
      description: Output from running with the --debug flag
      render: text
    validations:
      required: false
