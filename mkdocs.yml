site_name: TrackSplit
site_url: https://rouzax.github.io/TrackSplit/docs/
repo_url: https://github.com/Rouzax/TrackSplit
repo_name: Rouzax/TrackSplit

# Build into a dedicated, gitignored directory. The tracked `site/` holds the
# hand-curated landing page; mkdocs must not overwrite it.
site_dir: site_build

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

exclude_docs: |
  plans/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Usage: usage.md
  - Configuration: configuration.md
  - Output Structure: output.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
